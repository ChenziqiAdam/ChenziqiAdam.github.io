    image: "/images/arknights.jpg"
    alt: "Game: Arknights"
    quote: "At the far end of our civilization, once adorned by darkness and the brilliance of the stars up above, we will meet once again."
    rating: 4.5

  - type: game
    title: "Heart of Iron IV"
    subtitle: "Paradox Interactive"
    image: "/images/hoi4.jpg"
    alt: "Game: Heart of Iron IV"
    quote: "A good plan, violently executed now, is better than a perfect plan next week."
    rating: 4.5

  - type: game
    title: "Rusty Lake"
    subtitle: "Rusty Lake"
    image: "/images/rusty-lake.png"
    alt: "Game: Rusty Lake"
    quote: "The past is never dead, it's not even past."
    rating: 4.5
