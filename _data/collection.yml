    subtitle: "ZDF"
    image: "/images/generation-war.jpg"
    alt: "Drama: Generation War"
    quote: "War brings out the worst from us."
    rating: 4.5

  - type: drama
    title: "True Detective"
    subtitle: "HBO"
    image: "/images/true-detective.jpg"
    alt: "Drama: True Detective"
    quote: "We are things that labor under the illusion of having a self, that accretion of sensory experience and feelings, programmed with total assurance that we are each somebody, when in fact everybody's nobody"
    rating: 4.5

  - type: movie
    title: "The Dark Knight Trilogy"
    subtitle: "Christopher Nolan"
    image: "/images/dark-knight-trilogy.jpeg"
    alt: "Movie: The Dark Knight Trilogy"
    quote: "Why do we fall, Bruce? So that we can learn to pick ourselves up again."
    rating: 5

  - type: movie
    title: "The Godfather Trilogy"
    subtitle: "Francis Ford Coppola"
    image: "/images/godfather.jpg"
    alt: "Movie: The Godfather Trilogy"
    quote: "Great men are not born great, they grow great."
    rating: 4.5

  - type: movie
    title: "Dune"
    subtitle: "Frank Herbert"
    image: "/images/dune.png"
    alt: "Movie: Dune"
    quote: "Where the fear has gone there will be nothing. Only I will remain."
    rating: 5

  - type: movie
    title: "Interstellar"
    subtitle: "Christopher Nolan"
    image: "/images/interstellar.jpeg"
    alt: "Movie: Interstellar"
    quote: "Perhaps we've just forgotten that we are still pioneers. And we've barely begun. And that our greatest accomplishments cannot be behind us, that our destiny lies above us."
    rating: 5

  - type: anime
    title: "Cyberpunk Edgerunners"
    subtitle: "Netflix"
    image: "/images/cyberpunk-edgerunners.jpg"
    alt: "Anime: Cyberpunk Edgerunners"
    quote: "I'm Gonna Take You There Myself, Fly You To The Moon. That's A Promise."
    rating: 5

  - type: anime
    title: "Attack on Titan"
    subtitle: "Hajime Isayama"
    image: "/images/attack-on-titan.jpeg"
    alt: "Anime: Attack on Titan"
    quote: "A person who cannot give up anything, can change nothing."
    rating: 4.5

  - type: anime
    title: "Your Name"
    subtitle: "Makoto Shinkai"
    image: "/images/your-name.jpeg"
    alt: "Anime: Your Name"
    quote: "I feel like I'm always searching for someone, or something."
    rating: 5

  - type: anime
    title: "The Tunnel to Summer, the Exit of Goodbyes"
    subtitle: "Mei Hachimoku"
    image: "/images/tunnel.jpeg"
    alt: "Anime: The Tunnel to Summer"
    quote: "All we can do is pick whatever path suits us best, then run down it as fast as we can to see how far we can get in what little time we have."
    rating: 4.5

  - type: anime
    title: "Chainsaw Man"
    subtitle: "Tatsuki Fujimoto"
    image: "/images/chainsaw-man.jpg"
    alt: "Anime: Chainsaw Man"
    quote: "We're all carrying things we can't let go of. But it's those very things that make us who we are."
    rating: 4.5

  - type: anime
    title: "Frieren: Beyond Journey's End"
    subtitle: "Kanehito Yamada"
    image: "/images/frieren.jpg"
    alt: "Anime: Frieren"
    quote: "I'll tell you the secret to fighting strong enemies. It's easy, keep getting up and attack them with your moves continuously."
    rating: 5

  - type: anime
    title: "Ghost in the Shell"
    subtitle: "Masamune Shirow"
    image: "/images/ghost-in-the-shell.jpeg"
    alt: "Anime: Ghost in the Shell"
    quote: "Asking a favor only works when you're standing on higher ground."
    rating: 4.5

  - type: game
    title: "Arknights"
