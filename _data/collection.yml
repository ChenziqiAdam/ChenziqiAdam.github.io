  - type: drama
    title: "Shogun"
    subtitle: "FX Productions"
    image: "/images/shogun.jpg"
    alt: "Drama: Shogun"
    quote: "Fate is like a sword. Useful only to those who can wield it."
    rating: 4.5

  - type: drama
    title: "Slow Horses"
    subtitle: "Apple TV"
    image: "/images/slow-horses.jpeg"
    alt: "Drama: Slow Horses"
    quote: "Someone always pays. Make sure it isn't you"
    rating: 4.5

  - type: drama
    title: "Game of Thrones"
    subtitle: "HBO"
    image: "/images/game-of-thrones.jpg"
