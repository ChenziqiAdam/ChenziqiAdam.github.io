books:
  - type: novel
    title: "Norwegian Wood"
    subtitle: "Murakami Haruki"
    image: "/images/norwegian-wood.jpeg"
    alt: "Book: Norwegian Wood"
    quote: "I want you always to remember me. Will you remember that I existed, and that I stood next to you here like this?"
    rating: 5

  - type: novel
    title: "A Song of Ice and Fire"
    subtitle: "George R. R. Martin"
    image: "/images/a-song-of-ice-and-fire.jpeg"
    alt: "Book: A Song of Ice and Fire"
    quote: "A mind needs books as a sword needs a whetstone, if it is to keep its edge."
    rating: 4.5

  - type: novel
    title: "The Izu Dancer"
    subtitle: "Kawabata Yasunari"
    image: "/images/izu-dancer.jpg"
    alt: "Book: The Izu Dancer"
    quote: "I gave myself up to my tears. It was as though my head had turned to clear water, it was falling pleasantly away drop by drop; soon nothing would remain."
    rating: 4.5

  - type: essay
    title: "目送"
    subtitle: "龙应台"
    image: "/images/musong.jpeg"
    alt: "Book: 目送"
    quote: "我慢慢地、慢慢地了解到，所谓父女母子一场，只不过意味着，你和他的缘分就是今生今世不断地在目送他的背影渐行渐远。"
    rating: 5

  - type: novel
    title: "倾城之恋"
    subtitle: "张爱玲"
    image: "/images/qingchengzhilian.jpg"
    alt: "Book: 倾城之恋"
    quote: "花落自会又花开，花开自有落花来，醒也迟，梦也迟，一朝风雨满秋池，却是一片疏雨轻烟。"
    rating: 4.5

  - type: novel
    title: "台北人"
    subtitle: "白先勇"
    image: "/images/taibeiren.jpg"
    alt: "Book: 台北人"
    quote: "人生是虚无。一场梦。一个记忆。"
    rating: 5

  - type: essay
    title: "送你一颗子弹"
    subtitle: "刘瑜"
    image: "/images/send-you-a-bullet.jpg"
    alt: "Book: 送你一颗子弹"
    quote: "可求的只有你自己，你要俯下身去，朝着幽暗深处的自己伸出手去。"
    rating: 4.5

  - type: novel
    title: "The Wind Rises"
    subtitle: "Tatsuo Hori"
    image: "/images/the-wind-rises.jpg"
    alt: "Book: The Wind Rises"
    quote: "The wind has risen, we must try to live."
    rating: 4.5

artists:
  - type: writer
    title: "Haruki Murakami"
    subtitle: "Japanese Writer"
    image: "/images/haruki-murakami.jpg"
    alt: "Artist: Haruki Murakami"
    quote: "I want you always to remember me. Will you remember that I existed, and that I stood next to you like this?"
    rating: 5

  - type: writer
    title: "Osamu Dazai"
    subtitle: "Japanese Writer"
    image: "/images/osamu-dazai.png"
    alt: "Artist: Osamu Dazai"
    quote: "I had intended to die this winter."
    rating: 4.5

  - type: musician
    title: "Billie Eilish"
    subtitle: "American Singer-songwriter and Musician"
    image: "/images/billie-eilish.jpeg"
    alt: "Artist: Billie Eilish"
    quote: "I hope someday I'll make it out of here. Even if it takes all night or a hundred years."
    rating: 4.5

  - type: musician
    title: "Sawano Hiroyuki"
    subtitle: "Japanese Composer and Music Producer"
    image: "/images/sawano.jpeg"
    alt: "Artist: Sawano Hiroyuki"
    quote: "I don't have the power. On my side forever."
    rating: 4.5

  - type: writer
    title: "Yasunari Kawabata"
    subtitle: "Japanese novelist and short story writer"
    image: "/images/yasunari-kawabata.jpg"
    alt: "Artist: Yasunari Kawabata"
    quote: "Time flows in the same way for all human beings; every human being flows through time in a different way."
    rating: 4.5

  - type: musician
    title: "Hans Zimmer"
    subtitle: "German Composer and Music Producer"
    image: "/images/hans-zimmer.jpeg"
    alt: "Artist: Hans Zimmer"
    quote: "If something happened where I couldn't write music anymore, it would kill me. It's not just a job. It's not just a hobby. It's why I get up in the morning."
    rating: 4.5

  - type: musician
    title: "Kana Wakareno"
    subtitle: "Japanese Composer, Pianist and Singer"
    image: "/images/kana-wakareno.jpg"
    alt: "Artist: Kana Wakareno"
    quote: "Death has light."
    rating: 4.5

  - type: musician
    title: "Eason Chan"
    subtitle: "Hong Kong Singer and Actor"
    image: "/images/eason-chan.jpeg"
    alt: "Artist: Eason Chan"
    quote: "Sorrow Is Meaningless."
    rating: 4.5

digitals:
  - type: drama
    title: "Dark"
    subtitle: "Netflix"
