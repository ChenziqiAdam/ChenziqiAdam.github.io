    quote: "Make mistakes, learn from them, and when life hurts you—because it will—remember the hurt. The hurt is good. It means you're out of that cave."
    rating: 4.5

  - type: drama
    title: "Severance"
    subtitle: "Apple TV"
    image: "/images/severance.jpeg"
    alt: "Drama: Severance"
    quote: "The surest way to tame a prisoner is to let him believe he's free."
