<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>
  
  <!-- Version 1: Bold geometric A with better proportions -->
  <g transform="translate(0, 5)">
    <!-- A structure - thicker, more defined -->
    <path d="M28 70 L50 22 L72 70" 
          fill="none" 
          stroke="url(#accent)" 
          stroke-width="5" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
    
    <!-- Crossbar - positioned higher for classic A shape -->
    <line x1="36" y1="52" x2="64" y2="52" 
          stroke="url(#accent)" 
          stroke-width="4" 
          stroke-linecap="round"/>
  </g>
</svg>