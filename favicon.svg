<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b7"/>
      <stop offset="100%" style="stop-color:#d4a574"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="16" fill="url(#bg)"/>
  
  <!-- Outer circle - the horizon/edge -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
  
  <!-- Inner shape - stylized A for Adam -->
  <path d="M30 68 L50 28 L70 68" 
        fill="none" 
        stroke="url(#accent)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Crossbar of A -->
  <line x1="37" y1="52" x2="63" y2="52" 
        stroke="url(#accent)" 
        stroke-width="2" 
        stroke-linecap="round"
        opacity="0.8"/>
</svg>